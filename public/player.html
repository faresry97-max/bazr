<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>بازر — اللاعب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body{overflow-x:hidden}
.player-page{display:flex;flex-direction:column;min-height:calc(100vh - 50px);width:100%;max-width:500px;padding:0 16px}

/* ── Enhanced Buzzer ── */
.buzzer-container{position:relative;display:flex;justify-content:center;align-items:center;padding:16px 0}
.buzzer-ring{position:absolute;width:clamp(190px,52vw,290px);height:clamp(190px,52vw,290px);border-radius:50%;border:3px solid transparent;transition:border-color .3s}
.buzzer-ring.ready{border-color:rgba(224,32,64,.2);animation:ringPulse 1.5s ease-in-out infinite}
.buzzer-ring.locked{border-color:rgba(90,90,138,.15)}
.buzzer-ripple{position:absolute;width:clamp(190px,52vw,290px);height:clamp(190px,52vw,290px);border-radius:50%;pointer-events:none}
.ripple-wave{position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);opacity:0;animation:rippleOut .8s ease-out forwards}
@keyframes rippleOut{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.5);opacity:0}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.06);opacity:1}}

.buzzer-btn-v2{
  width:clamp(160px,44vw,250px);height:clamp(160px,44vw,250px);border-radius:50%;border:none;cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:clamp(24px,5.5vw,40px);font-weight:900;color:#fff;
  background:linear-gradient(145deg,#cc1833,#a0102a);position:relative;z-index:2;
  box-shadow:0 8px 36px rgba(204,24,51,.35),0 0 0 6px rgba(204,24,51,.08),inset 0 -8px 16px rgba(0,0,0,.25),inset 0 3px 6px rgba(255,255,255,.1);
  transition:transform .08s,box-shadow .15s;-webkit-tap-highlight-color:transparent;user-select:none;
}
.buzzer-btn-v2:active:not(:disabled){transform:scale(.9);box-shadow:0 4px 16px rgba(204,24,51,.25),inset 0 -2px 8px rgba(0,0,0,.35),inset 0 6px 10px rgba(0,0,0,.15)}
.buzzer-btn-v2:disabled{background:linear-gradient(145deg,var(--s3),var(--s2));box-shadow:0 4px 16px rgba(0,0,0,.3),0 0 0 6px rgba(0,0,0,.05);color:var(--dim);cursor:not-allowed}
.buzzer-btn-v2.ready{background:linear-gradient(145deg,#e02040,#c01030);animation:buzzerGlow 1.2s ease-in-out infinite}
.buzzer-btn-v2 .bz-label{display:block;font-size:clamp(11px,2.5vw,14px);font-weight:600;opacity:.7;margin-top:2px}

/* Chat */
.player-chat-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;z-index:80;background:var(--s1);border-top:1px solid var(--s3);border-radius:var(--rl) var(--rl) 0 0;max-height:44px;overflow:hidden;transition:max-height .3s ease}
.player-chat-panel.expanded{max-height:300px}
.p-chat-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;cursor:pointer;font-size:14px;font-weight:700;color:var(--mid)}
.p-chat-toggle .badge{background:var(--gold);color:#000;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:900}
</style>
</head>
<body>
<div class="noise-overlay"></div><div class="glow-overlay"></div>
<div class="page-header">
  <div class="logo"><span class="logo-dot"></span><span class="logo-text">جرس</span></div>
  <div class="header-stats">
    <div class="online-badge" id="global-online">🌐 0</div>
    <div class="player-counter"><span class="dot"></span><span id="player-count">0</span></div>
  </div>
</div>

<div class="player-page">
  <!-- Wait -->
  <div class="screen active" id="sc-wait">
    <div class="player-middle" style="padding-top:12vh">
      <div class="wait-screen">
        <div class="wait-icon">⏳</div>
        <h2>في الانتظار</h2>
        <p class="text-dim mb-8">الغرفة</p>
        <div class="wait-room-code" id="wait-code">------</div>
        <div class="wait-team" id="wait-team"></div>
        <p class="text-dim mt-16">بانتظار المقدّم...</p>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div class="screen" id="sc-game">
    <div class="player-top">
      <div class="player-mini-scores">
        <div class="mini-score a"><div class="ms-lbl">الفريق أ</div><div class="ms-val" id="p-score-a">0</div></div>
        <div class="mini-score b"><div class="ms-lbl">الفريق ب</div><div class="ms-val" id="p-score-b">0</div></div>
      </div>
    </div>
    <div class="player-middle">
      <div class="player-img-wrap hidden" id="p-img-wrap"><img id="p-img" class="question-img" alt=""></div>
      <div class="player-question" id="p-question">—</div>
      <div id="p-timer-section" class="hidden w-full">
        <div class="timer-bar-wrap"><div class="timer-bar" id="p-timer-bar"></div></div>
        <div class="timer-text" id="p-timer-text">15</div>
      </div>
      <div class="player-status" id="p-status"></div>
      <div class="player-answer-result hidden" id="p-answer-result"></div>

      <!-- Enhanced Buzzer -->
      <div class="buzzer-container" id="buzzer-wrap">
        <div class="buzzer-ring" id="buzz-ring"></div>
        <div class="buzzer-ripple" id="buzz-ripple"></div>
        <button class="buzzer-btn-v2" id="buzz-btn" onclick="buzz()" disabled>
          🔔<span class="bz-label">اضغط للمنافسة</span>
        </button>
      </div>

      <!-- Answer Input -->
      <div class="answer-input-wrap hidden" id="answer-wrap">
        <div class="answer-input-label">✍️ اكتب إجابتك</div>
        <div class="answer-input-row">
          <input type="text" id="answer-input" placeholder="إجابتك هنا..." autocomplete="off" maxlength="100">
          <button class="btn btn-gold" id="answer-submit-btn" onclick="submitAnswer()">إرسال</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Chat -->
<div class="player-chat-panel" id="chat-panel">
  <div class="p-chat-toggle" onclick="toggleChat()">💬 الدردشة <span class="badge hidden" id="chat-badge">0</span></div>
  <div class="chat-messages" id="p-chat" style="max-height:140px"></div>
  <div class="reactions-row">
    <button class="react-btn" onclick="sendReaction('👏')">👏</button>
    <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
    <button class="react-btn" onclick="sendReaction('😂')">😂</button>
    <button class="react-btn" onclick="sendReaction('💪')">💪</button>
    <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
  </div>
  <div class="chat-input-row">
    <input type="text" id="p-chat-input" placeholder="رسالة..." maxlength="120" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-gold btn-sm" onclick="sendChat()">إرسال</button>
  </div>
</div>

<div class="disconnect-overlay hidden" id="dc-overlay"><div class="spinner"></div><p class="mt-16" style="color:var(--mid)">إعادة الاتصال...</p></div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/player.js"></script>
</body>
</html>
