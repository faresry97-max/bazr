<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>بازر — اللاعب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body{overflow-x:hidden}
.player-page{display:flex;flex-direction:column;min-height:calc(100vh - 50px);width:100%;max-width:500px;padding:0 16px}
.player-chat-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;z-index:80;
background:var(--s1);border-top:1px solid var(--s3);border-radius:var(--rl) var(--rl) 0 0;max-height:44px;overflow:hidden;transition:max-height .3s ease}
.player-chat-panel.expanded{max-height:300px}
.chat-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;cursor:pointer;font-size:14px;font-weight:700;color:var(--mid)}
.chat-toggle .badge{background:var(--gold);color:#000;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:900;margin-right:4px}
</style>
</head>
<body>
<div class="page-header">
  <div class="logo">🔔 بازر</div>
  <div class="header-stats">
    <div class="online-badge" id="global-online">🌐 0</div>
    <div class="player-counter"><span class="dot"></span><span id="player-count">0</span></div>
  </div>
</div>

<div class="player-page">
  <!-- Wait -->
  <div class="screen active" id="sc-wait">
    <div class="player-middle" style="padding-top:15vh">
      <div class="wait-screen">
        <div class="wait-icon">⏳</div>
        <h2>في الانتظار</h2>
        <p class="text-dim mb-8">الغرفة</p>
        <div class="wait-room-code" id="wait-code">------</div>
        <div class="wait-team" id="wait-team"></div>
        <p class="text-dim mt-16">بانتظار المقدّم...</p>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div class="screen" id="sc-game">
    <div class="player-top">
      <div class="player-mini-scores">
        <div class="mini-score a"><div class="ms-lbl">أ</div><div class="ms-val" id="p-score-a">0</div></div>
        <div class="mini-score b"><div class="ms-lbl">ب</div><div class="ms-val" id="p-score-b">0</div></div>
      </div>
    </div>
    <div class="player-middle">
      <div class="player-question" id="p-question">—</div>
      <div id="p-timer-section" class="hidden w-full">
        <div class="timer-bar-wrap"><div class="timer-bar" id="p-timer-bar"></div></div>
        <div class="timer-text" id="p-timer-text">15</div>
      </div>
      <div class="player-status" id="p-status"></div>
      <div class="player-answer-result hidden" id="p-answer-result"></div>
      <div class="buzzer-wrap" id="buzzer-wrap">
        <button class="buzzer-btn" id="buzz-btn" onclick="buzz()" disabled>بازر!</button>
      </div>
      <div class="answer-input-wrap hidden" id="answer-wrap">
        <div class="answer-input-label">✍️ اكتب إجابتك</div>
        <div class="answer-input-row">
          <input type="text" id="answer-input" placeholder="إجابتك..." autocomplete="off" maxlength="100">
          <button class="btn btn-gold" id="answer-submit-btn" onclick="submitAnswer()">إرسال</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Chat Panel (bottom) -->
<div class="player-chat-panel" id="chat-panel">
  <div class="chat-toggle" onclick="toggleChat()">💬 الدردشة <span class="badge hidden" id="chat-badge">0</span></div>
  <div class="chat-messages" id="p-chat" style="max-height:140px"></div>
  <div class="reactions-row">
    <button class="react-btn" onclick="sendReaction('👏')">👏</button>
    <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
    <button class="react-btn" onclick="sendReaction('😂')">😂</button>
    <button class="react-btn" onclick="sendReaction('💪')">💪</button>
    <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
  </div>
  <div class="chat-input-row">
    <input type="text" id="p-chat-input" placeholder="رسالة..." maxlength="120" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-gold btn-sm" onclick="sendChat()">إرسال</button>
  </div>
</div>

<div class="disconnect-overlay hidden" id="dc-overlay">
  <div class="spinner"></div>
  <p class="mt-16" style="color:var(--mid)">إعادة الاتصال...</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/player.js"></script>
</body>
</html>
