<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بازر — النتائج</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .results-page {
      animation: slide-up 0.5s ease;
      padding-top: 32px;
    }
    .final-scores {
      display: flex;
      gap: 20px;
      margin: 24px 0;
    }
    .final-score-card {
      flex: 1;
      text-align: center;
      padding: 24px;
      border-radius: var(--r-lg);
      border: 2px solid;
      position: relative;
    }
    .final-score-card.winner {
      box-shadow: 0 0 30px rgba(240,180,41,0.15);
    }
    .final-score-card.winner::before {
      content: '👑';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
    }
    .final-score-card.a { border-color: rgba(56,199,240,0.3); background: rgba(56,199,240,0.06); }
    .final-score-card.b { border-color: rgba(240,80,96,0.3); background: rgba(240,80,96,0.06); }
    .final-score-label { font-size: 16px; font-weight: 600; color: var(--mid); }
    .final-score-num {
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 900;
      line-height: 1.1;
    }
    .final-score-card.a .final-score-num { color: var(--tA); }
    .final-score-card.b .final-score-num { color: var(--tB); }
    .player-results {
      margin-top: 24px;
    }
    .pr-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--s1);
      border: 1px solid var(--s2);
      border-radius: var(--r);
      margin-bottom: 8px;
    }
    .pr-rank {
      font-size: 20px;
      font-weight: 900;
      color: var(--dim);
      min-width: 28px;
    }
    .pr-name { flex: 1; font-weight: 700; font-size: 16px; }
    .pr-score {
      font-size: 20px;
      font-weight: 900;
    }
    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>
  <canvas class="confetti-canvas" id="confetti-canvas"></canvas>

  <div class="container">
    <div class="results-page">
      <div class="text-center">
        <div class="result-crown" id="r-crown">🏆</div>
        <h1 id="r-title">النتائج</h1>
        <p class="text-dim" id="r-subtitle"></p>
      </div>

      <div class="final-scores" id="r-scores">
        <div class="final-score-card a" id="r-card-a">
          <div class="final-score-label">الفريق أ</div>
          <div class="final-score-num" id="r-score-a">0</div>
        </div>
        <div class="final-score-card b" id="r-card-b">
          <div class="final-score-label">الفريق ب</div>
          <div class="final-score-num" id="r-score-b">0</div>
        </div>
      </div>

      <div class="player-results card" id="r-players">
        <h3 class="mb-16">ترتيب اللاعبين</h3>
        <div id="r-player-list"></div>
      </div>

      <div class="text-center mt-24">
        <a href="/" class="btn btn-gold btn-lg">🏠 العودة للرئيسية</a>
      </div>
    </div>
  </div>

  <script src="js/results.js"></script>
</body>
</html>
