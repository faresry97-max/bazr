<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bazzzzz — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.login-wrap{max-width:380px;margin:12vh auto 0;text-align:center;animation:slideUp .5s ease}
.login-icon{font-size:52px;margin-bottom:6px}
.login-card{background:var(--s1);border:1.5px solid var(--s3);border-radius:var(--rl);padding:28px 22px;margin-top:14px}

.dash{display:none;animation:fadeIn .4s ease}.dash.active{display:block}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.dash-title{font-size:20px;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:8px}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);padding:14px;text-align:center;transition:border-color .2s}
.stat-box:hover{border-color:rgba(240,180,41,.2)}
.stat-num{font-size:26px;font-weight:900;line-height:1.2}.stat-lbl{font-size:11px;color:var(--dim);margin-top:2px}

.admin-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.room-table{width:100%;border-collapse:collapse}
.room-table th{text-align:right;padding:8px 12px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--s3);font-weight:700}
.room-table td{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--s2)}
.room-table tr:hover td{background:rgba(255,255,255,.02)}
.r-status{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.r-status.lobby{background:rgba(240,180,41,.1);color:var(--gold)}
.r-status.playing{background:rgba(34,213,142,.1);color:var(--lime)}
.r-status.ended{background:rgba(240,80,96,.1);color:var(--red)}
.del-btn{padding:3px 8px;border:none;border-radius:5px;background:rgba(240,80,96,.1);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.del-btn:hover{background:rgba(240,80,96,.2)}
.log-box{background:var(--s2);border:1px solid var(--s3);border-radius:var(--r);padding:10px;max-height:180px;overflow-y:auto;font-size:11px;color:var(--mid);line-height:1.8;margin-top:8px;direction:ltr;text-align:left;font-family:'Courier New',monospace}
.empty-msg{text-align:center;padding:20px;color:var(--dim);font-size:13px}

@media(max-width:600px){.stat-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="page-header">
  <div class="logo">🔔 Bazzzzz</div>
  <div class="header-stats"><div class="online-badge" id="hdr-online">🌐 0</div></div>
</div>

<div class="container-wide">
  <!-- Login -->
  <div id="login-screen">
    <div class="login-wrap">
      <div class="login-icon">🔐</div>
      <h2>لوحة التحكم</h2>
      <p class="text-dim mb-12">دخول المسؤولين فقط</p>
      <div class="login-card">
        <div class="form-group"><label>اسم المستخدم</label><input type="text" id="admin-user" placeholder="admin" autocomplete="username"></div>
        <div class="form-group"><label>كلمة المرور</label><input type="password" id="admin-pass" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="btn btn-gold btn-lg w-full mt-8" id="login-btn" onclick="doLogin()">دخول 🔑</button>
        <div class="error-msg" id="login-error"></div>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dash" id="dashboard">
    <div class="dash-header">
      <div class="dash-title">🛡️ لوحة التحكم</div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="text-dim" style="font-size:12px" id="admin-name"></span>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">خروج</button>
      </div>
    </div>

    <div class="stat-row" id="stats-row">
      <div class="stat-box"><div class="stat-num text-lime" id="d-online">—</div><div class="stat-lbl">متصل الآن</div></div>
      <div class="stat-box"><div class="stat-num text-gold" id="d-rooms">—</div><div class="stat-lbl">غرف نشطة</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--tA)" id="d-players">—</div><div class="stat-lbl">لاعبين</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--purple)" id="d-questions">—</div><div class="stat-lbl">سؤال</div></div>
    </div>

    <div class="admin-actions">
      <button class="btn btn-gold btn-sm" onclick="refreshDash()">🔄 تحديث</button>
      <button class="btn btn-rose btn-sm" onclick="clearAllRooms()">🗑️ حذف الغرف</button>
      <button class="btn btn-lime btn-sm" onclick="clearLB()">🏆 مسح المتصدرين</button>
      <a href="/" class="btn btn-ghost btn-sm">🏠 الرئيسية</a>
    </div>

    <div class="card" style="padding:16px">
      <h3 class="mb-8" style="font-size:14px">🏠 الغرف</h3>
      <table class="room-table"><thead><tr><th>الكود</th><th>الحالة</th><th>اللاعبين</th><th></th></tr></thead><tbody id="rooms-tbody"></tbody></table>
    </div>

    <div class="card" style="padding:16px">
      <h3 class="mb-8" style="font-size:14px">🏆 المتصدرين</h3>
      <div id="admin-lb"></div>
    </div>

    <div class="card" style="padding:16px">
      <h3 class="mb-8" style="font-size:14px">📋 السجل</h3>
      <div class="log-box" id="log-box"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let loggedIn = false, refreshTimer = null;
const $ = id => document.getElementById(id);

const ADMINS = {"admin":"bazr2024","fares":"fares97"};

socket.on("global-stats", d => {
  $("hdr-online").textContent = "🌐 " + d.online;
  if (loggedIn) { $("d-online").textContent = d.online; $("d-rooms").textContent = d.rooms; }
});

socket.on("connect", () => { if (loggedIn) { addLog("✅ Socket reconnected"); refreshDash(); } });
socket.on("disconnect", () => { if (loggedIn) addLog("⚠️ Socket disconnected"); });

function doLogin() {
  const user = $("admin-user").value.trim(), pass = $("admin-pass").value;
  if (!user || !pass) { $("login-error").textContent = "أدخل البيانات"; return; }
  if (!ADMINS[user] || ADMINS[user] !== pass) { $("login-error").textContent = "بيانات خاطئة"; return; }
  loggedIn = true;
  $("login-screen").style.display = "none";
  $("dashboard").classList.add("active");
  $("admin-name").textContent = "👤 " + user;
  addLog("تسجيل دخول: " + user);
  refreshDash();
  refreshTimer = setInterval(refreshDash, 8000);
}

function doLogout() {
  loggedIn = false;
  clearInterval(refreshTimer);
  $("login-screen").style.display = "block";
  $("dashboard").classList.remove("active");
  $("admin-user").value = ""; $("admin-pass").value = "";
  $("login-error").textContent = "";
}

function refreshDash() {
  socket.emit("admin-get-stats", {}, data => {
    if (!data) { addLog("❌ Failed to get stats"); return; }
    $("d-online").textContent = data.online || 0;
    $("d-rooms").textContent = data.roomCount || 0;
    $("d-players").textContent = data.totalPlayers || 0;
    $("d-questions").textContent = data.questionCount || 0;

    const tbody = $("rooms-tbody");
    if (!data.rooms || data.rooms.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">لا توجد غرف</td></tr>';
    } else {
      tbody.innerHTML = data.rooms.map(r => {
        const stLabel = r.state === "lobby" ? "انتظار" : r.state === "playing" ? "يلعب" : "منتهية";
        return `<tr><td style="font-weight:700;color:var(--gold);letter-spacing:2px">${r.code}</td><td><span class="r-status ${r.state}">${stLabel}</span></td><td>${r.playerCount}</td><td><button class="del-btn" onclick="delRoom('${r.code}')">حذف</button></td></tr>`;
      }).join("");
    }

    const lb = $("admin-lb");
    if (data.leaderboard && data.leaderboard.length) {
      const m = ["🥇","🥈","🥉"];
      lb.innerHTML = data.leaderboard.map((e, i) => `<div class="lb-row"><span class="lb-rank">${m[i]||(i+1)}</span><div class="lb-name">${e.name}</div><span class="lb-score">${e.score}</span></div>`).join("");
    } else {
      lb.innerHTML = '<div class="empty-msg">لا توجد نتائج</div>';
    }
  });
}

function delRoom(code) {
  if (!confirm("حذف " + code + "؟")) return;
  socket.emit("admin-delete-room", { code }, r => { if (r.success) { addLog("🗑️ حذف: " + code); refreshDash(); } });
}
function clearAllRooms() {
  if (!confirm("حذف جميع الغرف؟")) return;
  socket.emit("admin-clear-rooms", {}, r => { if (r.success) { addLog("🗑️ حذف جميع الغرف"); refreshDash(); } });
}
function clearLB() {
  if (!confirm("مسح المتصدرين؟")) return;
  socket.emit("admin-clear-leaderboard", {}, r => { if (r.success) { addLog("🏆 مسح المتصدرين"); refreshDash(); } });
}

function addLog(msg) {
  const t = new Date().toLocaleTimeString("en", {hour12:false});
  const box = $("log-box");
  box.textContent += `[${t}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
}

$("admin-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
$("admin-user").addEventListener("keydown", e => { if (e.key === "Enter") $("admin-pass").focus(); });
</script>
</body>
</html>
