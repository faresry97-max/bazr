<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>جرس — من في الصورة؟</title>
<link rel="stylesheet" href="css/style.css">
<style>
.gw{max-width:660px;margin:0 auto;padding:16px;position:relative;z-index:1}
.scr{display:none;animation:fadeIn .4s ease}.scr.on{display:block}
.setup-hero{text-align:center;padding:clamp(16px,4vh,32px) 0 12px}
.setup-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rr);padding:20px;margin-bottom:12px;backdrop-filter:blur(16px)}
.t-inputs{display:flex;gap:10px;margin:8px 0}.t-inputs input{flex:1;text-align:center}
.cat-filter{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
.cf-btn{padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(198,160,80,.03);color:var(--muted);font-family:'Tajawal';font-size:10px;font-weight:600;cursor:pointer;transition:all .2s}
.cf-btn.on{border-color:var(--gold-2);background:rgba(198,160,80,.08);color:var(--gold-1)}.cf-btn:hover{border-color:var(--gold-3)}

/* ── HUD ── */
.hud{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:8px;backdrop-filter:blur(12px)}
.hud-score{display:flex;align-items:center;gap:6px;font-weight:900;font-size:18px}
.hud-score.a{color:var(--tA)}.hud-score.b{color:var(--tB)}
.hud-round{font-size:11px;color:var(--gold-2);font-weight:700;padding:3px 10px;border-radius:999px;background:rgba(198,160,80,.06);border:1px solid rgba(198,160,80,.1)}
.hud-timer{font-size:20px;font-weight:900;min-width:30px;text-align:center;transition:color .2s}
.hud-timer.warn{color:var(--gold-2)}.hud-timer.danger{color:var(--red);animation:pulseText .4s infinite}

/* ── Arena ── */
.arena{position:relative;width:100%;height:clamp(380px,60vh,520px);border-radius:var(--rr);overflow:hidden;background:radial-gradient(circle at 50% 40%,rgba(198,160,80,.04),var(--bg) 70%);border:1px solid var(--line);margin-bottom:8px;touch-action:none;user-select:none;-webkit-user-select:none}
.arena-img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(100px,25vw,160px);height:clamp(100px,25vw,160px);object-fit:contain;border-radius:50%;border:3px solid var(--line);background:var(--bg-soft);box-shadow:0 0 40px rgba(0,0,0,.5);z-index:5;pointer-events:none;transition:border-color .3s,box-shadow .3s}
.arena-img.correct-glow{border-color:var(--lime);box-shadow:0 0 40px rgba(126,196,126,.3)}
.arena-cat{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--gold-2);z-index:6;padding:3px 12px;border-radius:999px;background:rgba(10,10,15,.7);backdrop-filter:blur(8px);border:1px solid var(--line);white-space:nowrap}

/* ── Floating circles (options) ── */
.orb{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;z-index:10;font-weight:800;text-align:center;line-height:1.2;transition:transform .08s;-webkit-tap-highlight-color:transparent;user-select:none;border:2px solid rgba(198,160,80,.2);background:rgba(18,19,28,.85);backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.4);color:var(--txt)}
.orb:hover{transform:scale(1.1)!important;border-color:var(--gold-2);box-shadow:0 0 20px rgba(198,160,80,.15)}
.orb:active{transform:scale(.92)!important}
.orb.correct{border-color:var(--lime)!important;background:rgba(126,196,126,.2)!important;color:var(--lime)!important;box-shadow:0 0 24px rgba(126,196,126,.3)!important}
.orb.wrong{border-color:var(--red)!important;background:rgba(200,91,91,.15)!important;color:var(--red)!important;opacity:.4!important;pointer-events:none}
.orb.dead{pointer-events:none;opacity:.2!important}

/* ── Distractors ── */
.distractor{position:absolute;border-radius:50%;pointer-events:none;z-index:2;opacity:.12}

/* ── Status ── */
.g-status{text-align:center;font-size:13px;font-weight:700;margin:4px 0;min-height:18px;color:var(--muted)}
.g-reveal{text-align:center;padding:6px;background:rgba(198,160,80,.04);border:1px solid var(--line);border-radius:var(--r);color:var(--gold-1);font-weight:700;font-size:13px;display:none;margin:4px 0}
.g-reveal.show{display:block;animation:fadeIn .3s ease}

.sc-pop{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:2.5em;font-weight:900;pointer-events:none;z-index:200;animation:scoreFloat 1s ease forwards}
.sc-pop.a{color:var(--tA)}.sc-pop.b{color:var(--tB)}
.g-flash{position:fixed;inset:0;pointer-events:none;z-index:100;animation:flash .35s ease-out forwards}
.g-flash.ok{background:rgba(126,196,126,.1)}.g-flash.no{background:rgba(200,91,91,.1)}
.g-toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:8px 18px;background:var(--panel-solid);border:1px solid var(--line);border-radius:var(--rl);color:var(--txt);font-weight:600;font-size:12px;z-index:200;backdrop-filter:blur(16px);animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards}

.res{text-align:center;padding:clamp(16px,4vh,32px) 0}
.res-icon{font-size:52px;margin-bottom:6px}
.res-title{font-family:'Amiri',serif;font-size:clamp(22px,5vw,34px);font-weight:700;margin-bottom:14px}
.g-scores{display:flex;gap:10px}.g-sc{flex:1;text-align:center;padding:10px;border-radius:var(--rr);position:relative;overflow:hidden;backdrop-filter:blur(8px)}.g-sc::before{content:'';position:absolute;inset:0;opacity:.03}
.g-sc.a{border:1.5px solid rgba(91,168,200,.2);background:rgba(91,168,200,.03)}.g-sc.a::before{background:var(--tA)}
.g-sc.b{border:1.5px solid rgba(200,91,110,.2);background:rgba(200,91,110,.03)}.g-sc.b::before{background:var(--tB)}
.g-sc-name{font-size:11px;font-weight:700;color:var(--muted);position:relative}.g-sc-val{font-size:clamp(28px,6vw,42px);font-weight:900;line-height:1;position:relative}
.g-sc.a .g-sc-val{color:var(--tA)}.g-sc.b .g-sc-val{color:var(--tB)}
.res-acts{display:flex;gap:8px;justify-content:center;margin-top:16px}

@media(max-width:480px){.arena{height:clamp(320px,55vh,420px)}.t-inputs{flex-direction:column}.orb{font-size:10px!important}}
</style>
</head>
<body>
<div class="noise-overlay"></div><div class="glow-overlay"></div>
<div class="gw">
<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:6px">
  <div class="logo"><span class="logo-dot"></span><span class="logo-text">جرس</span></div>
  <a href="/" class="btn btn-ghost" style="font-size:10px;padding:5px 10px">← الرئيسية</a>
</div>

<!-- ═══ Setup ═══ -->
<div class="scr on" id="sc-setup">
  <div class="setup-hero">
    <div style="font-size:44px;margin-bottom:4px">🎯</div>
    <h2 style="color:var(--gold-2);font-size:clamp(20px,4vw,28px)">من في الصورة؟</h2>
    <p style="color:var(--muted);font-size:11px;margin-top:3px">اضغط الكرة الصحيحة بأسرع وقت — الكرات تتحرك وتزيد سرعتها!</p>
  </div>
  <div class="setup-card">
    <label>أسماء الفرق</label>
    <div class="t-inputs">
      <input id="t1-name" placeholder="🔵 الفريق الأول" value="الفريق الأزرق">
      <input id="t2-name" placeholder="🔴 الفريق الثاني" value="الفريق الأحمر">
    </div>
    <label>عدد الجولات</label>
    <select id="rounds-count" style="margin-bottom:8px">
      <option value="5">5 — سريعة</option><option value="10" selected>10 — عادية</option>
      <option value="15">15 — طويلة</option><option value="20">20 — ماراثون</option>
    </select>
    <label>التصنيفات</label>
    <div class="cat-filter" id="cat-filter"></div>
    <button class="btn btn-gold btn-lg w-full mt-8" onclick="startGame()">🚀 ابدأ</button>
  </div>
</div>

<!-- ═══ Game ═══ -->
<div class="scr" id="sc-game">
  <div class="hud">
    <div class="hud-score a" id="h-t1"><span id="h-t1n">أ</span> <span id="h-t1s">0</span></div>
    <div class="hud-round" id="h-round">1/10</div>
    <div class="hud-timer" id="h-timer">10</div>
    <div class="hud-score b" id="h-t2"><span id="h-t2s">0</span> <span id="h-t2n">ب</span></div>
  </div>
  <div class="arena" id="arena">
    <div class="arena-cat" id="arena-cat">❓</div>
    <img class="arena-img" id="arena-img" src="" alt="❓">
  </div>
  <div class="g-status" id="g-status"></div>
  <div class="g-reveal" id="g-reveal"></div>
</div>

<!-- ═══ Result ═══ -->
<div class="scr" id="sc-result">
  <div class="res">
    <div class="res-icon" id="fr-icon">🏆</div>
    <div class="res-title" id="fr-title">النتيجة</div>
    <div class="g-scores" style="max-width:300px;margin:14px auto">
      <div class="g-sc a"><div class="g-sc-name" id="fr-t1n">أ</div><div class="g-sc-val" id="fr-t1s">0</div></div>
      <div class="g-sc b"><div class="g-sc-name" id="fr-t2n">ب</div><div class="g-sc-val" id="fr-t2s">0</div></div>
    </div>
    <div class="res-acts">
      <button class="btn btn-gold btn-lg" onclick="resetGame()">🔄 مرة أخرى</button>
      <a href="/" class="btn btn-ghost btn-lg">🏠</a>
    </div>
  </div>
</div>
</div>

<script src="js/guessBank.js"></script>
<script>
if(!window.GUESS_BANK||!window.GUESS_BANK.length){const F="https://flagcdn.com/w320";window.GUESS_BANK=[
{img:F+"/sa.png",a:"السعودية",cat:"أعلام",opts:["الإمارات","السعودية","الكويت","قطر","البحرين","عُمان"]},
{img:F+"/eg.png",a:"مصر",cat:"أعلام",opts:["العراق","سوريا","مصر","اليمن","الأردن","لبنان"]},
{img:F+"/us.png",a:"أمريكا",cat:"أعلام",opts:["كندا","أمريكا","أستراليا","بريطانيا","فرنسا","ألمانيا"]},
{img:F+"/gb.png",a:"بريطانيا",cat:"أعلام",opts:["فرنسا","ألمانيا","بريطانيا","هولندا","النرويج","أيسلندا"]},
{img:F+"/jp.png",a:"اليابان",cat:"أعلام",opts:["الصين","كوريا","اليابان","تايلاند","إندونيسيا","فيتنام"]},
];}

const BANK=window.GUESS_BANK,$=id=>document.getElementById(id);
const AC=window.AudioContext||window.webkitAudioContext;let actx;
function tone(f,d,t,v){try{if(!actx)actx=new AC();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.1,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}catch(e){}}
function sndOk(){tone(523,.1);setTimeout(()=>tone(659,.1),100);setTimeout(()=>tone(784,.12),200)}
function sndNo(){tone(200,.1,'sawtooth');setTimeout(()=>tone(150,.12,'sawtooth'),100)}
function sndTick(){tone(900,.03,'sine',.06)}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}
function go(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');window.scrollTo({top:0})}
function doFlash(ok){const e=document.createElement('div');e.className='g-flash '+(ok?'ok':'no');document.body.appendChild(e);e.addEventListener('animationend',()=>e.remove())}
function scorePop(t,p){const e=document.createElement('div');e.className='sc-pop '+(t===1?'a':'b');e.textContent='+'+p;document.body.appendChild(e);setTimeout(()=>e.remove(),1100)}
function toast(m){const e=document.createElement('div');e.className='g-toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}

// ── Category setup ──
const catQ={"أعلام عربية":"🏳️ علم أي دولة؟","أعلام أوروبية":"🏳️ علم أي دولة؟","أعلام آسيوية":"🏳️ علم أي دولة؟","أعلام أفريقية":"🏳️ علم أي دولة؟","أعلام أمريكية":"🏳️ علم أي دولة؟","أعلام أوقيانوسية":"🏳️ علم أي دولة؟"};
let selectedCats=new Set();
const allCats=[...new Set(BANK.map(q=>q.cat))];
const catEl=$("cat-filter");
allCats.forEach(c=>{
  const n=BANK.filter(q=>q.cat===c).length;
  const b=document.createElement('button');b.className='cf-btn on';b.textContent=c+" ("+n+")";
  b.onclick=()=>{b.classList.toggle('on');selectedCats.has(c)?selectedCats.delete(c):selectedCats.add(c)};
  selectedCats.add(c);catEl.appendChild(b);
});

// ── State ──
let t1={name:"",score:0},t2={name:"",score:0};
let round=0,maxRounds=10,pts=5,locked=false;
let questions=[],tmr=null,tl=10,animFrame=null;
let orbs=[],distractors=[];

function startGame(){
  t1.name=$("t1-name").value.trim()||"الفريق الأزرق";
  t2.name=$("t2-name").value.trim()||"الفريق الأحمر";
  maxRounds=parseInt($("rounds-count").value)||10;
  t1.score=0;t2.score=0;round=0;
  let pool=BANK;
  if(selectedCats.size>0&&selectedCats.size<allCats.length)pool=pool.filter(q=>selectedCats.has(q.cat));
  if(pool.length<maxRounds){maxRounds=Math.min(maxRounds,pool.length);toast("⚠️ تم تقليل الجولات لـ "+maxRounds)}
  questions=shuffle(pool).slice(0,maxRounds);
  go('sc-game');showRound();
}

function showRound(){
  if(round>=maxRounds){showFinal();return;}
  locked=false;
  const q=questions[round];
  const arena=$("arena");

  // HUD
  $("h-t1n").textContent=t1.name;$("h-t2n").textContent=t2.name;
  $("h-t1s").textContent=t1.score;$("h-t2s").textContent=t2.score;
  $("h-round").textContent=`${round+1}/${maxRounds}`;
  $("arena-cat").textContent=catQ[q.cat]||"❓ ما في الصورة؟";
  $("g-status").textContent="⚡ اضغط الكرة الصحيحة!";
  $("g-reveal").classList.remove("show");$("g-reveal").textContent="";

  // Clear arena
  arena.querySelectorAll('.orb,.distractor').forEach(e=>e.remove());
  cancelAnimationFrame(animFrame);orbs=[];distractors=[];

  // Image
  const img=$("arena-img");img.classList.remove("correct-glow");img.src="";
  const pre=new Image();
  pre.onload=()=>{img.src=q.img;spawnOrbs(q);startTimer();startAnimation()};
  pre.onerror=()=>{setTimeout(()=>{img.src=q.img;spawnOrbs(q);startTimer();startAnimation()},300)};
  pre.src=q.img;
}

// ── Spawn floating option circles ──
function spawnOrbs(q){
  const arena=$("arena");
  const W=arena.clientWidth,H=arena.clientHeight;
  const orbSize=clamp(W*0.16,52,80);
  const speed=1.2+round*0.25; // Speed increases each round
  const shuffled=shuffle(q.opts);

  shuffled.forEach((opt,i)=>{
    const el=document.createElement('div');
    el.className='orb';
    el.style.width=orbSize+'px';el.style.height=orbSize+'px';
    el.style.fontSize=clamp(orbSize*0.17,9,13)+'px';
    el.textContent=opt;
    el.addEventListener('click',()=>pickOrb(opt,el,q));
    el.addEventListener('touchstart',e=>{e.preventDefault();pickOrb(opt,el,q)},{passive:false});

    // Random position (avoid center where image is)
    let x,y,tries=0;
    do{x=Math.random()*(W-orbSize);y=Math.random()*(H-orbSize);tries++}
    while(tries<20&&Math.hypot(x+orbSize/2-W/2,y+orbSize/2-H/2)<orbSize*2);

    const angle=Math.random()*Math.PI*2;
    const orb={el,x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size:orbSize};
    el.style.left=x+'px';el.style.top=y+'px';
    arena.appendChild(el);
    orbs.push(orb);
  });
}

// ── Spawn distractors (increases over time) ──
function spawnDistractor(){
  const arena=$("arena");
  const W=arena.clientWidth,H=arena.clientHeight;
  const size=Math.random()*20+8;
  const colors=['rgba(198,160,80,','rgba(91,168,200,','rgba(200,91,110,','rgba(126,196,126,'];
  const el=document.createElement('div');
  el.className='distractor';
  el.style.width=size+'px';el.style.height=size+'px';
  el.style.background=colors[Math.floor(Math.random()*colors.length)]+(Math.random()*.3+.1)+')';
  const x=Math.random()*(W-size),y=Math.random()*(H-size);
  el.style.left=x+'px';el.style.top=y+'px';
  arena.appendChild(el);
  const speed=2+round*0.3;
  const angle=Math.random()*Math.PI*2;
  distractors.push({el,x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size});
}

// ── Animation loop ──
function startAnimation(){
  const arena=$("arena");
  const W=arena.clientWidth,H=arena.clientHeight;
  let lastDistractor=Date.now();

  function frame(){
    // Move orbs
    orbs.forEach(o=>{
      o.x+=o.vx;o.y+=o.vy;
      if(o.x<=0||o.x>=W-o.size)o.vx*=-1;
      if(o.y<=0||o.y>=H-o.size)o.vy*=-1;
      o.x=Math.max(0,Math.min(W-o.size,o.x));
      o.y=Math.max(0,Math.min(H-o.size,o.y));
      o.el.style.left=o.x+'px';o.el.style.top=o.y+'px';
    });

    // Move distractors
    distractors.forEach(d=>{
      d.x+=d.vx;d.y+=d.vy;
      if(d.x<=0||d.x>=W-d.size)d.vx*=-1;
      if(d.y<=0||d.y>=H-d.size)d.vy*=-1;
      d.x=Math.max(0,Math.min(W-d.size,d.x));
      d.y=Math.max(0,Math.min(H-d.size,d.y));
      d.el.style.left=d.x+'px';d.el.style.top=d.y+'px';
    });

    // Spawn new distractors over time (more as time passes)
    const now=Date.now();
    const interval=Math.max(400,1500-round*100);
    if(now-lastDistractor>interval&&distractors.length<15+round*2&&!locked){
      spawnDistractor();lastDistractor=now;
    }

    if(!locked)animFrame=requestAnimationFrame(frame);
  }
  animFrame=requestAnimationFrame(frame);
}

function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

// ── Timer ──
function startTimer(){
  clearInterval(tmr);tl=10;
  $("h-timer").textContent=tl;$("h-timer").classList.remove("warn","danger");
  tmr=setInterval(()=>{
    tl--;$("h-timer").textContent=tl;
    $("h-timer").classList.remove("warn","danger");
    if(tl<=3){$("h-timer").classList.add("danger");if(tl>0)sndTick();}
    else if(tl<=5)$("h-timer").classList.add("warn");
    if(tl<=0){clearInterval(tmr);tmr=null;handleTimeUp();}
  },1000);
}

function handleTimeUp(){
  if(locked)return;locked=true;cancelAnimationFrame(animFrame);
  const q=questions[round];revealAnswer(q);sndNo();
  $("g-status").textContent="⏰ انتهى الوقت!";
  setTimeout(()=>{round++;showRound()},2000);
}

// ── Pick answer ──
function pickOrb(name,el,q){
  if(locked)return;
  if(name===q.a){
    locked=true;clearInterval(tmr);tmr=null;cancelAnimationFrame(animFrame);
    el.classList.add('correct');$("arena-img").classList.add("correct-glow");
    orbs.forEach(o=>{if(o.el!==el)o.el.classList.add('dead')});
    const team=(round%2===0)?1:2;
    if(team===1)t1.score+=pts;else t2.score+=pts;
    $("h-t1s").textContent=t1.score;$("h-t2s").textContent=t2.score;
    doFlash(true);sndOk();scorePop(team,pts);
    $("g-status").innerHTML=`✅ ${team===1?t1.name:t2.name} +${pts}!`;
    revealAnswer(q);
    setTimeout(()=>{round++;showRound()},1500);
  }else{
    el.classList.add('wrong');doFlash(false);sndNo();
  }
}

function revealAnswer(q){
  $("g-reveal").textContent="✅ "+q.a;$("g-reveal").classList.add("show");
  orbs.forEach(o=>{if(o.el.textContent===q.a)o.el.classList.add('correct')});
}

function showFinal(){
  clearInterval(tmr);cancelAnimationFrame(animFrame);
  $("fr-t1n").textContent=t1.name;$("fr-t2n").textContent=t2.name;
  $("fr-t1s").textContent=t1.score;$("fr-t2s").textContent=t2.score;
  if(t1.score>t2.score){$("fr-icon").textContent="🏆🔵";$("fr-title").textContent=t1.name+" الأبطال!";$("fr-title").style.color="var(--tA)"}
  else if(t2.score>t1.score){$("fr-icon").textContent="🏆🔴";$("fr-title").textContent=t2.name+" الأبطال!";$("fr-title").style.color="var(--tB)"}
  else{$("fr-icon").textContent="🤝";$("fr-title").textContent="تعادل!";$("fr-title").style.color="var(--gold-2)"}
  go('sc-result');
}

function resetGame(){t1.score=0;t2.score=0;round=0;clearInterval(tmr);cancelAnimationFrame(animFrame);go('sc-setup')}
</script>
