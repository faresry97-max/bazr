<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بازززز — من في الصورة؟</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060610;--s1:#0d0d24;--s2:#13133a;--s3:#1c1c52;--gold:#f0b429;--glt:#ffe066;--tA:#38c7f0;--tB:#f05060;--lime:#22d58e;--red:#ef4444;--txt:#eaf0ff;--dim:#5a5a8a;--mid:#8888bb;--r:12px}
html{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;
background:radial-gradient(ellipse at 20% 0%,rgba(56,199,240,.06),transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(240,80,96,.06),transparent 50%),var(--bg)}
.wrap{width:100%;max-width:700px;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:12px}
.logo{font-size:20px;font-weight:900;color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 20px;border:none;border-radius:var(--r);font-family:'Cairo';font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-g{background:linear-gradient(135deg,var(--gold),#d4960a);color:#1a1000}
.btn-o{background:var(--s2);color:var(--mid);border:1px solid var(--s3)}
.btn-lg{padding:14px 32px;font-size:16px}
.card{background:var(--s1);border:1px solid var(--s3);border-radius:16px;padding:20px;margin-bottom:12px}

/* Screens */
.scr{display:none;animation:fi .4s ease}.scr.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Setup */
.setup-center{text-align:center;padding:8vh 0 2vh}
.setup-icon{font-size:56px;margin-bottom:8px}
.team-inputs{display:flex;gap:10px;margin:14px 0}
.team-inputs input{flex:1;padding:12px;background:var(--s2);border:1.5px solid var(--s3);border-radius:var(--r);color:var(--txt);font-family:'Cairo';font-size:14px;text-align:center;outline:none}
.team-inputs input:focus{border-color:var(--gold)}
.team-inputs input::placeholder{color:var(--dim)}

/* Scoreboard */
.scoreboard{display:flex;gap:12px;margin-bottom:14px}
.score-card{flex:1;text-align:center;padding:14px;border-radius:14px;border:1.5px solid;position:relative}
.score-card.ta{border-color:rgba(56,199,240,.25);background:rgba(56,199,240,.04)}
.score-card.tb{border-color:rgba(240,80,96,.25);background:rgba(240,80,96,.04)}
.sc-name{font-size:12px;font-weight:700;color:var(--mid)}.sc-val{font-size:36px;font-weight:900;line-height:1}
.score-card.ta .sc-val{color:var(--tA)}.score-card.tb .sc-val{color:var(--tB)}

/* Round info */
.round-info{text-align:center;margin-bottom:10px;font-size:13px;color:var(--dim)}
.round-badge{display:inline-block;padding:4px 14px;border-radius:10px;background:rgba(240,180,41,.08);color:var(--gold);font-weight:700;font-size:12px;border:1px solid rgba(240,180,41,.15);margin-bottom:8px}

/* Image */
.img-card{text-align:center;margin-bottom:14px}
.guess-img{width:100%;max-width:360px;max-height:320px;object-fit:cover;border-radius:14px;border:2px solid var(--s3);box-shadow:0 8px 28px rgba(0,0,0,.5);transition:all .3s}
.guess-img.reveal{border-color:var(--gold);box-shadow:0 8px 36px rgba(240,180,41,.15)}

/* Options grid */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt{padding:12px;border-radius:var(--r);border:2px solid var(--s3);background:var(--s1);cursor:pointer;text-align:center;font-size:14px;font-weight:700;transition:all .2s;font-family:'Cairo'}
.opt:hover:not(.dis){border-color:var(--gold);transform:translateY(-2px)}
.opt.correct{border-color:var(--lime);background:rgba(34,213,142,.1);color:var(--lime)}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red);opacity:.5}
.opt.dis{cursor:default;opacity:.4}

/* Turn indicator */
.turn-indicator{text-align:center;padding:10px;border-radius:var(--r);margin-bottom:10px;font-weight:700;font-size:15px}
.turn-indicator.ta{background:rgba(56,199,240,.06);border:1px solid rgba(56,199,240,.15);color:var(--tA)}
.turn-indicator.tb{background:rgba(240,80,96,.06);border:1px solid rgba(240,80,96,.15);color:var(--tB)}

/* Timer */
.timer{text-align:center;font-size:28px;font-weight:900;margin-bottom:8px}
.timer.danger{color:var(--red);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.timer-bar{width:100%;height:5px;background:var(--s2);border-radius:3px;margin-bottom:12px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;background:var(--lime);transition:width 1s linear}
.timer-fill.warn{background:var(--gold)}.timer-fill.danger{background:var(--red)}

/* Result */
.result-center{text-align:center;padding:6vh 0}
.result-emoji{font-size:64px;margin-bottom:8px}
.result-title{font-size:28px;font-weight:900;margin-bottom:16px}
.result-title.ta{color:var(--tA)}.result-title.tb{color:var(--tB)}.result-title.tie{color:var(--gold)}

/* Flash */
.flash{position:fixed;inset:0;pointer-events:none;z-index:50;animation:flashA .4s ease forwards}
.flash.correct{background:rgba(34,213,142,.15)}.flash.wrong{background:rgba(239,68,68,.15)}
@keyframes flashA{from{opacity:1}to{opacity:0}}

@media(max-width:480px){.opts-grid{grid-template-columns:1fr}.guess-img{max-height:240px}}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <div class="logo">🖼️ بازززز</div>
  <a href="/" class="btn btn-o" style="font-size:12px">🏠 الرئيسية</a>
</div>

<!-- ═══ Setup ═══ -->
<div class="scr on" id="sc-setup">
  <div class="setup-center">
    <div class="setup-icon">🖼️</div>
    <h1 style="font-size:28px;color:var(--gold)">من في الصورة؟</h1>
    <p style="color:var(--dim);font-size:14px;margin:6px 0 16px">فريقين يتنافسان — ٣ جولات — ٥ نقاط لكل جولة</p>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">أسماء الفرق</div>
    <div class="team-inputs">
      <input id="t1-name" placeholder="🔵 الفريق الأول" value="الفريق الأزرق">
      <input id="t2-name" placeholder="🔴 الفريق الثاني" value="الفريق الأحمر">
    </div>
    <button class="btn btn-g btn-lg" style="width:100%" onclick="startGame()">🚀 ابدأ اللعب</button>
  </div>
</div>

<!-- ═══ Game ═══ -->
<div class="scr" id="sc-game">
  <div class="scoreboard">
    <div class="score-card ta"><div class="sc-name" id="g-t1n">الفريق أ</div><div class="sc-val" id="g-t1s">0</div></div>
    <div class="score-card tb"><div class="sc-name" id="g-t2n">الفريق ب</div><div class="sc-val" id="g-t2s">0</div></div>
  </div>
  <div class="round-info"><span class="round-badge" id="g-round">الجولة 1 / 3</span></div>
  <div class="turn-indicator" id="g-turn">دور الفريق أ</div>
  <div class="timer" id="g-timer">15</div>
  <div class="timer-bar"><div class="timer-fill" id="g-bar" style="width:100%"></div></div>
  <div class="img-card"><img class="guess-img" id="g-img" src="" alt="من هذا؟"></div>
  <div class="opts-grid" id="g-opts"></div>
</div>

<!-- ═══ Round Result ═══ -->
<div class="scr" id="sc-round">
  <div class="result-center">
    <div class="result-emoji" id="rr-emoji">✅</div>
    <div class="result-title" id="rr-title">الفريق أ يفوز بالجولة!</div>
    <p style="color:var(--dim);margin-bottom:20px" id="rr-sub">+5 نقاط</p>
    <button class="btn btn-g btn-lg" onclick="nextRound()">الجولة التالية ←</button>
  </div>
</div>

<!-- ═══ Final Result ═══ -->
<div class="scr" id="sc-result">
  <div class="result-center">
    <div class="result-emoji" id="fr-emoji">🏆</div>
    <div class="result-title" id="fr-title">النتيجة النهائية</div>
    <div class="scoreboard" style="margin:20px 0">
      <div class="score-card ta"><div class="sc-name" id="fr-t1n"></div><div class="sc-val" id="fr-t1s">0</div></div>
      <div class="score-card tb"><div class="sc-name" id="fr-t2n"></div><div class="sc-val" id="fr-t2s">0</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-g btn-lg" onclick="resetGame()">🔄 لعب مرة أخرى</button>
      <a href="/" class="btn btn-o btn-lg">🏠 الرئيسية</a>
    </div>
  </div>
</div>
</div>

<script>
// ── Guess Who Question Bank ──
// All images use flagcdn.com — 100% reliable, no rate limiting
const F = "https://flagcdn.com/w320";
const GUESS_BANK = [
{img:F+"/sa.png",answer:"السعودية",opts:["الإمارات","السعودية","الكويت","قطر","البحرين","عُمان"]},
{img:F+"/eg.png",answer:"مصر",opts:["العراق","سوريا","مصر","اليمن","الأردن","لبنان"]},
{img:F+"/ae.png",answer:"الإمارات",opts:["السعودية","الإمارات","الكويت","قطر","البحرين","عُمان"]},
{img:F+"/jp.png",answer:"اليابان",opts:["الصين","كوريا","اليابان","تايلاند","إندونيسيا","فيتنام"]},
{img:F+"/br.png",answer:"البرازيل",opts:["الأرجنتين","البرازيل","المكسيك","كولومبيا","تشيلي","بيرو"]},
{img:F+"/gb.png",answer:"بريطانيا",opts:["فرنسا","ألمانيا","بريطانيا","هولندا","النرويج","أيسلندا"]},
{img:F+"/us.png",answer:"أمريكا",opts:["كندا","أمريكا","أستراليا","بريطانيا","فرنسا","ألمانيا"]},
{img:F+"/tr.png",answer:"تركيا",opts:["تونس","تركيا","باكستان","أذربيجان","ماليزيا","الجزائر"]},
{img:F+"/de.png",answer:"ألمانيا",opts:["بلجيكا","ألمانيا","فرنسا","هولندا","النمسا","سويسرا"]},
{img:F+"/fr.png",answer:"فرنسا",opts:["إيطاليا","فرنسا","هولندا","رومانيا","بلجيكا","أيرلندا"]},
{img:F+"/it.png",answer:"إيطاليا",opts:["المكسيك","إيطاليا","أيرلندا","المجر","فرنسا","رومانيا"]},
{img:F+"/cn.png",answer:"الصين",opts:["فيتنام","الصين","تركيا","المغرب","تونس","كوريا"]},
{img:F+"/kr.png",answer:"كوريا الجنوبية",opts:["اليابان","كوريا الجنوبية","تايوان","الصين","فيتنام","تايلاند"]},
{img:F+"/in.png",answer:"الهند",opts:["باكستان","الهند","بنغلاديش","سريلانكا","نيبال","إيران"]},
{img:F+"/ca.png",answer:"كندا",opts:["أمريكا","كندا","أستراليا","بريطانيا","نيوزيلندا","الدنمارك"]},
{img:F+"/mx.png",answer:"المكسيك",opts:["إيطاليا","المكسيك","الهند","المجر","أيرلندا","البيرو"]},
{img:F+"/ar.png",answer:"الأرجنتين",opts:["أوروغواي","الأرجنتين","اليونان","السلفادور","نيكاراغوا","هندوراس"]},
{img:F+"/au.png",answer:"أستراليا",opts:["نيوزيلندا","أستراليا","بريطانيا","فيجي","أمريكا","كندا"]},
{img:F+"/ru.png",answer:"روسيا",opts:["فرنسا","روسيا","هولندا","لوكسمبورغ","صربيا","سلوفاكيا"]},
{img:F+"/za.png",answer:"جنوب أفريقيا",opts:["كينيا","جنوب أفريقيا","غانا","نيجيريا","تنزانيا","إثيوبيا"]},
{img:F+"/ng.png",answer:"نيجيريا",opts:["غانا","نيجيريا","الكاميرون","ساحل العاج","السنغال","مالي"]},
{img:F+"/ma.png",answer:"المغرب",opts:["تونس","المغرب","تركيا","الجزائر","ليبيا","موريتانيا"]},
{img:F+"/pk.png",answer:"باكستان",opts:["تركيا","باكستان","الجزائر","ماليزيا","موريتانيا","تونس"]},
{img:F+"/se.png",answer:"السويد",opts:["الدنمارك","السويد","فنلندا","النرويج","أيسلندا","سويسرا"]},
{img:F+"/no.png",answer:"النرويج",opts:["أيسلندا","النرويج","الدنمارك","فنلندا","السويد","بريطانيا"]},
{img:F+"/gr.png",answer:"اليونان",opts:["الأرجنتين","اليونان","أوروغواي","فنلندا","إسرائيل","السلفادور"]},
{img:F+"/pt.png",answer:"البرتغال",opts:["إسبانيا","البرتغال","إيطاليا","البرازيل","المكسيك","فرنسا"]},
{img:F+"/es.png",answer:"إسبانيا",opts:["البرتغال","إسبانيا","إيطاليا","المكسيك","كولومبيا","الأرجنتين"]},
{img:F+"/np.png",answer:"نيبال",opts:["الهند","نيبال","بوتان","سريلانكا","بنغلاديش","ميانمار"]},
{img:F+"/kz.png",answer:"كازاخستان",opts:["أوزبكستان","كازاخستان","تركمانستان","قيرغيزستان","منغوليا","طاجيكستان"]},
];

// ── Audio ──
const AC=window.AudioContext||window.webkitAudioContext;let actx;
function snd(f,d,t,v=.15){if(!actx)actx=new AC();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function sndOk(){snd(523,.1);setTimeout(()=>snd(659,.1),100);setTimeout(()=>snd(784,.15),200);}
function sndNo(){snd(200,.15,'sawtooth',.12);setTimeout(()=>snd(150,.2,'sawtooth',.12),150);}

// ── State ──
let t1={name:"",score:0},t2={name:"",score:0};
let round=0,maxRounds=3,pointsPerRound=5;
let currentTurn=1,questions=[],qi=0,tmr,tl=15,answered=false;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
const $=id=>document.getElementById(id);
function go(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}
function flash(type){const el=document.createElement('div');el.className='flash '+type;document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());}

function startGame(){
  t1.name=$("t1-name").value.trim()||"الفريق الأزرق";
  t2.name=$("t2-name").value.trim()||"الفريق الأحمر";
  t1.score=0;t2.score=0;round=0;qi=0;currentTurn=1;
  questions=shuffle(GUESS_BANK).slice(0,maxRounds);
  go('sc-game');showQuestion();
}

function showQuestion(){
  if(round>=maxRounds){showFinalResult();return;}
  answered=false;
  const q=questions[round];
  $("g-t1n").textContent=t1.name;$("g-t2n").textContent=t2.name;
  $("g-t1s").textContent=t1.score;$("g-t2s").textContent=t2.score;
  $("g-round").textContent=`الجولة ${round+1} / ${maxRounds}`;
  const team=currentTurn===1?t1:t2;
  $("g-turn").className="turn-indicator "+(currentTurn===1?"ta":"tb");
  $("g-turn").textContent=`🎯 دور ${team.name}`;
  const img=$("g-img");img.classList.remove("reveal");
  img.onerror=()=>{setTimeout(()=>{img.src="";img.src=q.img;},800);};
  img.src=q.img;

  // Shuffle 6 options
  const shuffled=shuffle(q.opts);
  $("g-opts").innerHTML=shuffled.map((o,i)=>`<button class="opt" onclick="pick(${i},'${o.replace(/'/g,"\\'")}')">${o}</button>`).join("");

  tl=15;startTimer();
}

function startTimer(){
  $("g-timer").textContent=tl;$("g-bar").style.width="100%";
  $("g-timer").classList.remove("danger");$("g-bar").classList.remove("warn","danger");
  clearInterval(tmr);
  tmr=setInterval(()=>{
    tl--;$("g-timer").textContent=tl;$("g-bar").style.width=(tl/15*100)+"%";
    if(tl<=5){$("g-timer").classList.add("danger");$("g-bar").classList.add("danger");}
    else if(tl<=8)$("g-bar").classList.add("warn");
    if(tl<=0){clearInterval(tmr);timeUp();}
  },1000);
}

function timeUp(){
  if(answered)return;
  // Switch to other team
  if(currentTurn===1){currentTurn=2;showQuestion();}
  else{answered=true;showRoundResult(null);}
}

function pick(idx,name){
  if(answered)return;answered=true;clearInterval(tmr);
  const q=questions[round];
  const btns=document.querySelectorAll('.opt');btns.forEach(b=>b.classList.add('dis'));

  if(name===q.answer){
    btns[idx].classList.add('correct');$("g-img").classList.add("reveal");
    const team=currentTurn===1?t1:t2;team.score+=pointsPerRound;
    $("g-t1s").textContent=t1.score;$("g-t2s").textContent=t2.score;
    flash('correct');sndOk();
    setTimeout(()=>showRoundResult(currentTurn),1200);
  }else{
    btns[idx].classList.add('wrong');
    // Highlight correct
    btns.forEach(b=>{if(b.textContent===q.answer)b.classList.add('correct');});
    flash('wrong');sndNo();
    if(currentTurn===1){
      // Give other team a chance
      setTimeout(()=>{answered=false;currentTurn=2;showQuestion();},1500);
    }else{
      setTimeout(()=>showRoundResult(null),1500);
    }
  }
}

function showRoundResult(winner){
  if(winner){
    const team=winner===1?t1:t2;
    $("rr-emoji").textContent="✅";
    $("rr-title").textContent=team.name+" يفوز بالجولة!";
    $("rr-title").className="result-title "+(winner===1?"ta":"tb");
    $("rr-sub").textContent="+"+pointsPerRound+" نقاط";
  }else{
    $("rr-emoji").textContent="⏰";
    $("rr-title").textContent="لم يجب أحد!";
    $("rr-title").className="result-title tie";
    $("rr-sub").textContent="لا نقاط لأي فريق";
  }
  go('sc-round');
}

function nextRound(){
  round++;currentTurn=(round%2===0)?1:2;
  if(round>=maxRounds){showFinalResult();return;}
  go('sc-game');showQuestion();
}

function showFinalResult(){
  $("fr-t1n").textContent=t1.name;$("fr-t2n").textContent=t2.name;
  $("fr-t1s").textContent=t1.score;$("fr-t2s").textContent=t2.score;
  if(t1.score>t2.score){$("fr-emoji").textContent="🏆🔵";$("fr-title").textContent=t1.name+" الأبطال!";$("fr-title").className="result-title ta";}
  else if(t2.score>t1.score){$("fr-emoji").textContent="🏆🔴";$("fr-title").textContent=t2.name+" الأبطال!";$("fr-title").className="result-title tb";}
  else{$("fr-emoji").textContent="🤝";$("fr-title").textContent="تعادل!";$("fr-title").className="result-title tie";}
  go('sc-result');
}

function resetGame(){t1.score=0;t2.score=0;round=0;go('sc-setup');}
</script>
</body>
</html>
